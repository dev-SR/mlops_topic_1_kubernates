name: CI Pipeline

on:
  push:
    branches: ['main']
  pull_request:

env:
  IMAGE_NAME: devhellosr/hello-joker

jobs:
  # =========================
  # 1. TEST JOB
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  # =========================
  # 2. BUILD & PUSH DOCKER IMAGE
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: test # ensures test runs first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract short SHA
        id: vars
        run: echo "SHA_SHORT=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Your Docker Hub username
          password: ${{ secrets.DOCKER_TOKEN }} # The personal access token
        # To set DOCKER_USERNAME and DOCKER_TOKEN:
        # 1. Go to https://hub.docker.com/settings/security
        # 2. Create a Personal Access Token (PAT) with 'Read & Write' permissions
        # 3. Give it a descriptive name (e.g., 'GitHub Actions CI') and copy the token
        # 4. In GitHub: Repository → Settings → Secrets → Actions → New repository secret
        #    - Name: DOCKER_USERNAME → your Docker Hub username
        #    - Name: DOCKER_TOKEN → the token you just created
        # 5. The workflow now logs into Docker securely using the token, without ever using your real password

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHA_SHORT }}

  # =========================
  # 3. UPDATE HELM CHART
  # =========================
  update:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo (for Helm chart update)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      # How to set GH_TOKEN for this workflow:
      # 1. Go to GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
      #    Link: https://github.com/settings/tokens
      # 2. Click 'Generate new token' → select repository 'dev-SR/MLOP-proj1'
      # 3. Grant 'Read & Write' permissions on repository "contents"
      #    (this allows the workflow to commit and push changes to values.yaml)
      # 4. Copy the token (you will only see it once)
      # 5. In your GitHub repository: Settings → Secrets and variables → Actions → New repository secret
      #    - Name: GH_TOKEN
      #    - Value: the personal access token you just created
      # 6. Now the workflow can safely checkout the repo, update the Helm chart, and push changes

      - name: Extract short SHA
        id: vars
        run: echo "SHA_SHORT=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/download/v4.2.0/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update Helm values
        run: |
          yq e -i ".image.tag = \"${{ steps.vars.outputs.SHA_SHORT }}\"" k8s/hello-joker/values.yaml

      - name: Commit and Push
        run: |
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          git add k8s/hello-joker/values.yaml
          git commit -m "Update helm chart ${{ steps.vars.outputs.SHA_SHORT }}" || echo "No changes"
          git push
